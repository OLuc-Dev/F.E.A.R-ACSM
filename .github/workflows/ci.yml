name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python tooling
        # Lint/type/test do not need the heavy ML/audio stack (chromadb,
        # sentence-transformers/torch, whisper, pyaudio): those are imported
        # lazily and stubbed in tests. Installing only the tooling and the light
        # deps keeps CI fast and avoids the portaudio system dependency that
        # pyaudio would otherwise need to compile.
        run: |
          python -m pip install --upgrade pip
          python -m pip install "ruff>=0.8,<1" "mypy>=1.13,<2" "pytest>=8.3,<9" \
            "pytest-asyncio>=0.23,<1" "types-requests>=2.32,<3" \
            "openai>=1.55,<2" "python-dotenv>=1,<2" \
            "fastapi>=0.115,<0.116" "httpx>=0.27,<1"
      - name: Lint Python
        run: python -m ruff check fear tests
      - name: Check Python formatting
        run: python -m ruff format --check fear tests
      - name: Typecheck Python
        run: python -m mypy fear --ignore-missing-imports
      - name: Test Python
        run: python -m pytest

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install frontend dependencies
        run: npm ci
      - name: Check frontend formatting
        run: npm run format:check
      - name: Typecheck frontend
        run: npm run typecheck
      - name: Test frontend
        run: npm test
      - name: Build frontend
        run: npm run build
